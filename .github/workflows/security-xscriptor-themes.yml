name: Security Scan (xscriptor-themes)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --allow-no-lockfiles
        themes/xscriptor-themes/package.json
      results-file-name: osv-results-xscriptor-themes.sarif
      fail-on-vuln: false
