name: Security Scan (xscriptor-themes)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OSV Scanner (xscriptor-themes)
        uses: google/osv-scanner-action@v1
        continue-on-error: true
        with:
          scan-args: >-
            --format sarif
            --output osv-results.sarif
            themes/xscriptor-themes/package.json

      - name: Upload OSV results artifact
        uses: actions/upload-artifact@v4
        with:
          name: osv-results-xscriptor-themes
          path: osv-results.sarif

      - name: Upload OSV results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif
