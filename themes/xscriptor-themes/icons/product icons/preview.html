<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X Product Icons Preview</title>
  <style>
    :root {
      --bg: #121212;
      --panel: #1b1b1b;
      --text: #f1f1f1;
      --accent: #fce566;
      --muted: #8d8d8d;
      --line: #2a2a2a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1a1a1a 0%, var(--bg) 55%);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 20px;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      background: #121212ee;
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0;
      font-size: 18px;
      color: var(--accent);
    }
    p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      padding: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      min-height: 96px;
      padding: 12px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }
    .card img {
      width: 16px;
      height: 16px;
      filter: brightness(0) saturate(100%) invert(89%) sepia(32%) saturate(644%) hue-rotate(345deg) brightness(103%) contrast(97%);
    }
    .card span {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.2;
      word-break: break-word;
    }
    .card-error {
      color: #fc618d;
    }
  </style>
</head>
<body data-preview-variant="x-min">
  <header>
    <h1 id="preview-title">X Product Icons</h1>
    <p id="preview-description">Compact preview rendered from shared SVG metadata.</p>
  </header>
  <main class="grid" id="icon-grid"></main>
  <script type="module" src="./preview-gallery.js"></script>
</body>
</html>
